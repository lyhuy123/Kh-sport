<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Football Analytics Pro</title>
    <style>
        /* Modern Dark Theme Variables */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --card-hover: #334155;
            --primary: #38bdf8;
            --accent: #f43f5e;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --gold: #fbbf24;
            --success: #22c55e;
        }

        body { font-family: 'Segoe UI', 'Hanuman', system-ui, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; }
        
        header { background-color: var(--card-bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .logo-container svg { height: 35px; fill: var(--gold); }
        h1 { margin: 0; font-size: 20px; letter-spacing: 1px; }
        
        .live-sync { display: flex; align-items: center; gap: 8px; background: rgba(34, 197, 94, 0.1); border: 1px solid var(--success); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; color: var(--success); }
        .sync-dot { width: 8px; height: 8px; background-color: var(--success); border-radius: 50%; animation: pulseSync 1.5s infinite; }
        @keyframes pulseSync { 0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.7); } 70% { box-shadow: 0 0 0 6px rgba(34,197,94,0); } 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); } }

        .lang-btn { background-color: var(--primary); color: #0f172a; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .lang-btn:hover { background-color: #0ea5e9; transform: scale(1.05); }

        .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }

        /* Loader */
        .loader-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0; color: var(--gold); }
        .spinner { width: 50px; height: 50px; border: 5px solid var(--card-hover); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Match Selector */
        .match-selector { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 20px; scrollbar-width: thin; scrollbar-color: var(--primary) var(--card-bg); }
        .match-selector::-webkit-scrollbar { height: 8px; }
        .match-selector::-webkit-scrollbar-track { background: var(--card-bg); border-radius: 10px; }
        .match-selector::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .select-card { background-color: var(--card-bg); min-width: 250px; padding: 15px; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 2px solid transparent; transition: all 0.2s; }
        .select-card:hover { background-color: var(--card-hover); }
        .select-card.active { border-color: var(--gold); background-color: var(--card-hover); }
        .mini-team { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 14px; font-weight: bold; text-align: center; width: 40%; }
        .mini-flag { width: 40px; height: 40px; border-radius: 50%; object-fit: contain; background: #fff; padding: 2px; }
        .vs-text { font-size: 12px; color: var(--text-muted); }

        /* Main Card */
        .match-card { background-color: var(--card-bg); border-radius: 12px; padding: 30px; text-align: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); margin-bottom: 20px; position: relative; overflow: hidden; transition: all 0.3s; }
        .status-badge { position: absolute; top: 15px; right: -30px; padding: 5px 30px; font-size: 12px; font-weight: bold; transform: rotate(45deg); letter-spacing: 1px; background-color: var(--success); color: white; }
        
        .match-header { color: var(--gold); font-size: 14px; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 1px; font-weight: bold; }
        .teams-container { display: flex; justify-content: space-between; align-items: center; }
        .team { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .main-flag { width: 100px; height: 100px; border-radius: 50%; background: #fff; padding: 5px; object-fit: contain; box-shadow: 0 4px 6px rgba(0,0,0,0.4); }
        .team-name { font-size: 24px; font-weight: bold; }

        /* Score Box */
        .center-action-box { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .score-prediction-box { background: linear-gradient(145deg, rgba(30,41,59,0.8), rgba(15,23,42,0.9)); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 15px 30px; min-width: 160px; box-shadow: 0 0 20px rgba(56,189,248,0.1), inset 0 0 10px rgba(0,0,0,0.5); }
        .score-title { color: var(--gold); font-size: 13px; margin-bottom: 10px; font-weight: bold; }
        .score-numbers { font-size: 46px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 20px; }
        
        /* Grids */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background-color: var(--card-bg); padding: 25px; border-radius: 12px; }
        .card h3 { margin-top: 0; color: var(--gold); border-bottom: 1px solid #334155; padding-bottom: 10px; font-size: 16px; }
        .card p { line-height: 1.6; color: #cbd5e1; font-size: 15px; }

        @media (max-width: 768px) { 
            .info-grid { grid-template-columns: 1fr; } 
            .teams-container { flex-direction: column; gap: 20px; }
            .center-action-box { margin: 15px 0; width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="logo-container">
                <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                <h1 id="app-title">Live API Hub</h1>
            </div>
            <div class="live-sync"><div class="sync-dot"></div> API CONNECTED</div>
        </div>
        <button class="lang-btn" onclick="toggleLang()">ខ្មែរ / EN</button>
    </header>

    <div class="container">
        <h3 id="selector-title" style="margin-top: 0; color: var(--text-muted); font-size: 16px; display: none;">Select Match:</h3>
        
        <div class="match-selector" id="matchSelector"></div>
        
        <div id="app-content">
            <div class="loader-container">
                <div class="spinner"></div>
                <h3 id="loading-text">Loading API Data...</h3>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'en'; 
        let currentMatchId = null;
        let matchesData = []; // Will be populated from API

        const uiText = {
            title: { en: "Live API Football Data", km: "ទិន្នន័យកីឡាពី API ផ្ទាល់" },
            selector: { en: "Select Match:", km: "ជ្រើសរើសការប្រកួត៖" },
            score: { en: "FINAL SCORE", km: "ពិន្ទុបញ្ចប់ការប្រកួត" },
            stadium: { en: "🏟️ Stadium / Location", km: "🏟️ កីឡដ្ឋាន" },
            details: { en: "📋 Match Details", km: "📋 ព័ត៌មានលម្អិត" },
            loading: { en: "Loading Real Data from API...", km: "កំពុងទាញយកទិន្នន័យពិតពី API..." }
        };

        function toggleLang() { 
            currentLang = currentLang === 'en' ? 'km' : 'en'; 
            if(matchesData.length > 0) renderApp(); 
            else {
                document.getElementById('app-title').innerText = uiText.title[currentLang];
                document.getElementById('loading-text').innerText = uiText.loading[currentLang];
            }
        }
        
        function selectMatch(id) { 
            currentMatchId = id; 
            renderApp(); 
        }

        // --- 🔴 ACTUAL API FETCH FROM THESPORTSDB ---
        async function fetchRealDataFromAPI() {
            // Using a free endpoint that gives the last 15 matches of a specific league (e.g., English Premier League ID 4328)
            const url = 'https://www.thesportsdb.com/api/v1/json/3/eventslast.php?id=4328';
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                // Map the API JSON to our application's structure
                matchesData = data.results.slice(0, 5).map((match, index) => {
                    return {
                        id: index,
                        league: match.strLeague,
                        date: match.dateEvent + " • " + match.strTime,
                        stadium: match.strVenue,
                        t1: { 
                            name: match.strHomeTeam, 
                            score: match.intHomeScore,
                            // The API provides badges in a different endpoint, so we use a fallback placeholder for instant loading
                            badge: `https://ui-avatars.com/api/?name=${match.strHomeTeam.replace(' ','+')}&background=random&color=fff&size=128`
                        },
                        t2: { 
                            name: match.strAwayTeam, 
                            score: match.intAwayScore,
                            badge: `https://ui-avatars.com/api/?name=${match.strAwayTeam.replace(' ','+')}&background=random&color=fff&size=128`
                        }
                    }
                });

                // Set default match
                if(matchesData.length > 0) {
                    currentMatchId = matchesData[0].id;
                    document.getElementById('selector-title').style.display = 'block';
                    renderApp();
                }
                
            } catch (error) {
                console.error("API Error:", error);
                document.getElementById('app-content').innerHTML = `<h3 style="text-align:center; color:var(--accent);">API Request Failed. Please try again later.</h3>`;
            }
        }

        function renderApp() {
            document.getElementById('app-title').innerText = uiText.title[currentLang];
            document.getElementById('selector-title').innerText = uiText.selector[currentLang];

            // Render Match Selector
            const selectorDiv = document.getElementById('matchSelector');
            selectorDiv.innerHTML = matchesData.map(m => `
                <div class="select-card ${m.id === currentMatchId ? 'active' : ''}" onclick="selectMatch(${m.id})">
                    <div class="mini-team">
                        <img src="${m.t1.badge}" class="mini-flag">
                        <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px;">${m.t1.name}</span>
                    </div>
                    <span class="vs-text">${m.t1.score} - ${m.t2.score}</span>
                    <div class="mini-team">
                        <img src="${m.t2.badge}" class="mini-flag">
                        <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px;">${m.t2.name}</span>
                    </div>
                </div>
            `).join('');

            const match = matchesData.find(m => m.id === currentMatchId);
            
            // Render Main Interface
            document.getElementById('app-content').innerHTML = `
                <div class="match-card">
                    <div class="status-badge">FINISHED</div>
                    <div class="match-header">${match.league} • ${match.date}</div>
                    
                    <div class="teams-container">
                        <div class="team">
                            <img src="${match.t1.badge}" class="main-flag">
                            <div class="team-name" style="color: var(--primary);">${match.t1.name}</div>
                        </div>
                        
                        <div class="center-action-box">
                            <div class="score-prediction-box">
                                <div class="score-title">${uiText.score[currentLang]}</div>
                                <div class="score-numbers">
                                    <span style="color: var(--primary);">${match.t1.score}</span>
                                    <span class="score-divider">-</span>
                                    <span style="color: var(--accent);">${match.t2.score}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="team">
                            <img src="${match.t2.badge}" class="main-flag">
                            <div class="team-name" style="color: var(--accent);">${match.t2.name}</div>
                        </div>
                    </div>
                </div>

                <div class="info-grid">
                    <div class="card">
                        <h3>${uiText.stadium[currentLang]}</h3>
                        <p style="font-size: 18px; font-weight: bold; color: white;">${match.stadium}</p>
                        <p style="color: var(--text-muted);">Data provided dynamically by TheSportsDB API.</p>
                    </div>
                    <div class="card">
                        <h3>${uiText.details[currentLang]}</h3>
                        <p><strong>League:</strong> ${match.league}</p>
                        <p><strong>Home Team:</strong> ${match.t1.name}</p>
                        <p><strong>Away Team:</strong> ${match.t2.name}</p>
                    </div>
                </div>
            `;
        }

        // Initialize App and Fetch Real API Data
        document.addEventListener("DOMContentLoaded", () => {
            fetchRealDataFromAPI();
        });
    </script>
</body>
</html>
